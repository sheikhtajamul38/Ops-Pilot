name: CD

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Smoke test
        run: echo "Staging deploy — image ${{ github.sha }} ready"

      - name: Health check simulation
        run: echo "Health check passed"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    steps:
      - name: Deploy to production
        run: echo "Production deploy approved for ${{ github.sha }}"